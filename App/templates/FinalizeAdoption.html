<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h3 class="mb-0">🏠 Welcome Home, {{ application.animal.name }}!</h3>
                </div>
                <div class="card-body p-4">
                    <p class="text-center text-muted">Since you've completed the adoption in person, please upload a photo to update our community records!</p>
                    <hr>
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Photo with your new pet (Required)</label>
                            <input type="file" name="proof1" class="form-control" accept="image/*" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small">Extra Photo (Optional)</label>
                            <input type="file" name="proof2" class="form-control" accept="image/*">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small">How is the first day going?</label>
                            <textarea name="notes" class="form-control" rows="3" placeholder="Tell us about their new favorite spot..."></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow">
                                Confirm Adoption & Upload
                            </button>
                            <a href="{% url 'UserProfile' %}" class="btn btn-link text-muted mt-2">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
