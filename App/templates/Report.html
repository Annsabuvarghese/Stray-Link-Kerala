<!DOCTYPE html>
<html>
<head>
    <title>Report Stray Animal</title>
</head>
<body>

<h2>Report Abandoned / Injured Animal</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Animal Type (Radio Button) -->
    <p><strong>Animal Type</strong></p>
    <input type="radio" name="animal_type" value="dog" required> Dog <br>
    <input type="radio" name="animal_type" value="cat"> Cat <br>

    <!-- Condition (Checkbox) -->
    <p><strong>Condition</strong></p>
    {% for condition in conditions %}
        <input type="checkbox"
               name="conditions"
               value="{{ condition.id }}">
        {{ condition.name|title }} <br>
    {% endfor %}

    <!-- Number -->
    <p><strong>Number of animals</strong></p>
    <input type="number" name="animal_count">

    <!-- Manual Location -->
    <p><strong>Location (Landmark / Address)</strong></p>
    <textarea name="manual_location" required></textarea>

    <!-- Live Location -->
    <input type="hidden" name="auto_latitude" id="latitude">
    <input type="hidden" name="auto_longitude" id="longitude">

    <button type="button" onclick="getLocation()">Get Live Location</button>

    <p id="location_status"></p>

    <!-- Images -->
    <p><strong>Upload Photos</strong></p>
    <input type="file" name="pic1"><br>
    <input type="file" name="pic2"><br>
    <input type="file" name="pic3"><br>
    <input type="file" name="pic4"><br>

    <br>
    <button type="submit">Submit Report</button>
</form>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById("latitude").value = position.coords.latitude;
            document.getElementById("longitude").value = position.coords.longitude;
            document.getElementById("location_status").innerText = "Live location captured ✔";
        }, function() {
            document.getElementById("location_status").innerText = "Location access denied ❌";
        });
    } else {
        alert("Geolocation not supported");
    }
}
</script>

</body>
</html>
