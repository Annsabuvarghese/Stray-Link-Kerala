<!DOCTYPE html>
<html>
<head>
    <title>Report Stray Animal</title>
</head>
<body>

<h2>Report Stray Animal Case</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Animal Type (Radio) -->
    <p><strong>Animal Type:</strong></p>
    {{ form.animal_type }}

    <!-- Condition (Checkbox) -->
    <p><strong>Condition:</strong></p>
    {{ form.conditions }}

    <!-- Number -->
    <p>
        <label>Number of Animals:</label><br>
        {{ form.animal_count }}
    </p>

    <!-- Manual Location -->
    <p>
        <label>Location (Road / Landmark):</label><br>
        <input type="text" name="manual_location" id="manual_location" required>
    </p>

    <!-- Hidden Auto Location -->
    <input type="hidden" name="auto_latitude" id="auto_latitude">
    <input type="hidden" name="auto_longitude" id="auto_longitude">
    <input type="hidden" name="location_source" id="location_source" value="manual">

    <button type="button" onclick="getLocation()">Use Live Location</button>

    <!-- Description -->
    <p>
        <label>Description (optional):</label><br>
        {{ form.description }}
    </p>

    <!-- Images -->
    <p>
        <label>Upload Photos:</label><br>
        <input type="file" name="images" multiple>
    </p>

    <button type="submit">Submit Report</button>
</form>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(position) {
                document.getElementById("auto_latitude").value = position.coords.latitude;
                document.getElementById("auto_longitude").value = position.coords.longitude;
                document.getElementById("location_source").value = "auto";

                document.getElementById("manual_location").value =
                    "Live location captured. You may edit landmark.";

                alert("Live location captured successfully.");
            },
            function() {
                alert("Unable to fetch location. Please enter manually.");
            }
        );
    } else {
        alert("Geolocation not supported by this browser.");
    }
}
</script>

</body>
</html>
