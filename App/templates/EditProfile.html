{% load static %}

<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fff6ef;
font-family:Arial;
}

.edit-card{
max-width:700px;
margin:auto;
margin-top:60px;
border-radius:15px;
border-top:5px solid #ff8c42;
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #ff8c42;
}

.btn-save{
background:#ff8c42;
border:none;
}

.btn-save:hover{
background:#e67e22;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow edit-card p-4">

<h3 class="mb-4 text-center">Edit Profile</h3>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="text-center mb-4">

{% if profile.image %} <img src="{{ profile.image.url }}" class="profile-img">
{% else %} <img src="{% static 'images/default_user.png' %}" class="profile-img">
{% endif %}

</div>

<div class="mb-4">
<label class="form-label">Change Profile Image</label>
<input type="file" name="image" class="form-control">
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" name="full_name" class="form-control" value="{{ profile.full_name }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone</label>
<input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Date of Birth</label>
<input type="date" name="dob" class="form-control" value="{{ profile.dob|date:'Y-m-d' }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">District</label>
<input type="text" name="district" class="form-control" value="{{ profile.district }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">City</label>
<input type="text" name="city" class="form-control" value="{{ profile.city }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Local Body</label>
<input type="text" name="local_body" class="form-control" value="{{ profile.local_body }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Ward No</label>
<input type="text" name="ward_no" class="form-control" value="{{ profile.ward_no }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">House No</label>
<input type="text" name="house_no" class="form-control" value="{{ profile.house_no }}">
</div>

<div class="col-md-12 mb-3">
<label class="form-label">Address</label>
<textarea name="address" class="form-control" rows="3">{{ profile.address }}</textarea>
</div>

</div>

<div class="mt-3">

<button type="submit" class="btn btn-save text-white">
Save Changes
</button>

<a href="{% url 'UserProfile' %}" class="btn btn-secondary">
Cancel
</a>

</div>

</form>

</div>

</div>

</body>

</html>
