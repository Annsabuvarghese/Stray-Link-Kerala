{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7f6;
}

.edit-card{
max-width:700px;
margin:auto;
margin-top:60px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow edit-card p-4">

<h3 class="mb-4">Edit Profile</h3>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" name="full_name" class="form-control" value="{{ profile.full_name }}">
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
</div>

<div class="col-md-6 mb-3">
<label>Date of Birth</label>
<input type="date" name="dob" value="{{ profile.dob|date:'Y-m-d' }}">
</div>


<div class="col-md-6 mb-3">
<label>District</label>
<input type="text" name="district" class="form-control" value="{{ profile.district }}">
</div>

<div class="col-md-6 mb-3">
<label>City</label>
<input type="text" name="city" class="form-control" value="{{ profile.city }}">
</div>

<div class="col-md-6 mb-3">
<label>Local Body</label>
<input type="text" name="local_body" class="form-control" value="{{ profile.local_body }}">
</div>

<div class="col-md-6 mb-3">
<label>Ward No</label>
<input type="text" name="ward_no" class="form-control" value="{{ profile.ward_no }}">
</div>

<div class="col-md-6 mb-3">
<label>House No</label>
<input type="text" name="house_no" class="form-control" value="{{ profile.house_no }}">
</div>

<div class="col-md-12 mb-3">
<label>Address</label>
<textarea name="address" class="form-control">{{ profile.address }}</textarea>
</div>

</div>

<button type="submit" class="btn btn-primary">
Save Changes
</button>

<a href="{% url 'UserProfile' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>
</html>
