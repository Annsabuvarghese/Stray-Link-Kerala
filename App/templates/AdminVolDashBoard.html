<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table class="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>District</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for profile in pending_profiles %}
        <tr>
            <td>{{ profile.full_name }}</td>
            <td>{{ profile.district }}</td>
            <td>{{ profile.phone }}</td>
            <td>
                <a href="{% url 'ApproveVolunteer' profile.id %}" class="btn btn-success btn-sm">Approve</a>
            </td>
             <td>
                <a href="{% url 'RejectVolunteer' profile.id %}" class="btn btn-danger btn-sm">Reject</a>   
            </tr>
        {% empty %}
        <tr><td colspan="4">No pending requests.</td></tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
