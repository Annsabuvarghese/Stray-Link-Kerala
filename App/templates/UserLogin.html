{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StrayLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

    <nav>
        <a href="{% url 'Home' %}">Home</a>
        <a href="{% url 'ReportList' %}">Rescue Feed</a>
        <a href="{% url 'AnimalAdoptList' %}">Adopt</a>
        <a href="{% url 'UserRegister' %}" class="active">Join Us</a>
    </nav>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="welcome-icon">🐾</div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to continue saving lives</p>

            <form method="POST">
                {% csrf_token %}

                <div class="input-group">
                    <input type="text" name="username" placeholder="Username or Email" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>


                <button type="submit" class="login-btn">Login to Account</button>
            </form>

            <div class="register-prompt">
                <p>Not a member yet?</p>
                <a href="{% url 'UserRegister' %}" class="reg-link">Create an Account</a>
            </div>
        </div>
    </div>

</body>
</html>
