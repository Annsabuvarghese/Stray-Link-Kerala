{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Registration</title>

<link rel="stylesheet" href="{% static 'css/UserRegister.css' %}">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    padding:30px;
}

nav{
    margin-bottom:20px;
}

nav a{
    margin-right:15px;
    text-decoration:none;
    font-weight:bold;
}

form{
    background:white;
    padding:25px;
    border-radius:8px;
    max-width:500px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea,select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#2c7be5;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1a5fd1;
}
</style>

</head>

<body>

<nav>
<a href="{% url 'Home' %}">Home</a>
<a href="{% url 'Report' %}">Report Animal</a>
<a href="{% url 'ReportList' %}">Report List</a>
<a href="{% url 'AnimalAdoptList' %}">Adopt</a>
</nav>

<h2>User Registration</h2>

<form method="POST">
{% csrf_token %}

<!-- <label>
  <input type="checkbox" name="is_volunteer" value="true"
    {% if is_volunteer %} checked {% endif %} disabled>
    Register as Volunteer
</label> -->

<input type="hidden" name="is_volunteer" value="{% if is_volunteer %}true{% else %}false{% endif %}">

<label>Username</label>
<input type="text" name="username" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Full Name</label>
<input type="text" name="full_name" required>

<label>Phone</label>
<input type="text" name="phone" required>

<label>Full Address</label>
<textarea name="address" required></textarea>

<label>District</label>
<select id="district" name="district" required>
    <option>Loading districts...</option>
</select>

<label>City</label>
<select id="city" name="city" disabled required>
    <option>-- Select District First --</option>
</select>

<label>Muncipality/Panjayath</label>
<select id="localBody" name="local_body" disabled required>
    <option>-- Select District First --</option>
</select>

<label>Ward Number</label>
<select id="ward" name="ward_no" required>
<option value="">Select Ward</option>
</select>

<label>House Number</label>
<input type="text" name="house_no" required>

<label>Date of Birth</label>
<input type="date" name="dob" required>

<label>Password</label>
<input type="password" name="password1" required>

<label>Confirm Password</label>
<input type="password" name="password2" required>

<button type="submit">Register</button>

</form>

<script>
const districtSelect = document.getElementById("district");
const citySelect = document.getElementById("city");
const localBodySelect = document.getElementById("localBody");
const wardSelect = document.getElementById("ward");

const DATA_URL = "https://raw.githubusercontent.com/opendatakerala/map.opendatakerala.org/main/data/lsgkerala.csv";

let keralaData = {}; // stores all LSGs by district
let cities = new Set(); // stores unique city names for dropdown

async function loadKeralaData(){
    try{
        const response = await fetch(DATA_URL);
        const text = await response.text();
        const rows = text.trim().split("\n");

        rows.slice(1).forEach(row=>{
            const cols = row.split(",");
            const name = cols[1].trim();
            const district = cols[3].trim();

            // Save all LSGs by district
            if(!keralaData[district]) keralaData[district]=[];
            keralaData[district].push(name);

            // Extract city from name for city dropdown
            const city = name
                .replace(" Municipality","")
                .replace(" Corporation","")
                .replace(" Grama Panchayat","")
                .replace(" Panchayat","")
                .trim();
            cities.add(city);
        });

        // Populate District dropdown alphabetically
        districtSelect.innerHTML='<option value="">Select District</option>';
        Object.keys(keralaData).sort().forEach(dist=>{
            districtSelect.add(new Option(dist.replace(" district",""),dist));
        });

    } catch(err){
        console.error(err);
        districtSelect.innerHTML='<option>Error loading districts</option>';
    }
}

// When district changes
districtSelect.addEventListener("change", function(){
    const dist = this.value;

    // Enable city dropdown
    citySelect.innerHTML='<option value="">Select City</option>';
    citySelect.disabled = !dist;

    // Populate city dropdown alphabetically (all cities from the district)
    if(dist && keralaData[dist]){
        const citySet = new Set();
        keralaData[dist].forEach(body=>{
            const city = body
                .replace(" Municipality","")
                .replace(" Corporation","")
                .replace(" Grama Panchayat","")
                .replace(" Panchayat","")
                .trim();
            citySet.add(city);
        });
        Array.from(citySet).sort().forEach(city=>{
            citySelect.add(new Option(city, city));
        });
    }

    // Populate Local Body dropdown with all LSGs in the district
    localBodySelect.innerHTML='<option value="">Select Local Body</option>';
    localBodySelect.disabled = !dist;
    if(dist && keralaData[dist]){
        keralaData[dist].sort().forEach(body=>{
            localBodySelect.add(new Option(body, body));
        });
    }
});

// Ward numbers 1-50
for(let i=1;i<=50;i++){
    wardSelect.add(new Option(i,i));
}

loadKeralaData();
</script>

</body>
</html>
